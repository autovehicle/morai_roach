dataset:
  root_dir: "/mnt/c/Users/Autonav/Desktop/morai_dataset"
  
morai:
  host: "10.255.255.254"
  grpc_port: 50051
  ego_vehicle: "Hyundai_IONIQ5"

ros:
  setup_bat: ""
  master_uri: "http://172.24.181.244:11311"
  topics:
    camera_front:       "/morai/camera/front/image_raw"
    camera_front_left:  "/morai/camera/front_left/image_raw"
    camera_front_right: "/morai/camera/front_right/image_raw"
    camera_rear_left:   "/morai/camera/rear_left/image_raw"
    camera_rear_right:  "/morai/camera/rear_right/image_raw"
    gnss:               "/morai/gnss"
    imu:                "/morai/imu"
    gt_objects:         "/Object_topic"
    gt_lanes:           "/morai/gt/lanes"
    traffic_light:      "/GetTrafficLightStatus"
    ego_state:          "/morai/ego_vehicle_status"

collection:
  default_episodes: 10
  sync_window_ms: 20
  normal_hz: 2
  longtail_hz: 10
  goal_threshold_m: 5.0

zones:

  urban:
    map_name: "K_City_Urban"
    scenarios:
      - traffic_jam
      - sudden_brake
      - pedestrian_yield
      - obstacle_avoid
      - lane_keeping
    spawn_ranges:
      x: [37.0, 133.0]
      y: [1143.0, 1254.0]
      yaw: [-180.0, 180.0]
    goal_ranges:
      x: [37.0, 133.0]
      y: [1143.0, 1254.0]
    max_steps: 1000

  highway:
    map_name: "K_City_Highway"
    scenarios:
      - high_speed_lane_keeping
      - sudden_brake
      - cut_in_response
      - merge_decision
      - lane_change_response
      - tollgate_tunnel_slowdown
    spawn_ranges:
      x: [0.0, 200.0]
      y: [0.0, 10.0]
      yaw: [0.0, 5.0]
    goal_ranges:
      x: [800.0, 1000.0]
      y: [0.0, 10.0]
    max_steps: 2000

  roundabout:
    map_name: "K_City_Roundabout"
    scenarios:
      - basic_driving
      - yield_to_circulating
      - roundabout_merge
      - follow_lead_vehicle
      - exit_roundabout
    spawn_ranges:
      x: [300.0, 400.0]
      y: [300.0, 400.0]
      yaw: [-180.0, 180.0]
    goal_ranges:
      x: [350.0, 450.0]
      y: [350.0, 450.0]
    max_steps: 600

  intersection:
    map_name: "K_City_Intersection"
    scenarios:
      - straight_clear
      - red_light_stop
      - stop_and_go
      - left_turn
      - right_turn_pedestrian_yield
      - no_traffic_light
    spawn_ranges:
      x: [350.0, 450.0]
      y: [200.0, 280.0]
      yaw: [-90.0, 90.0]
    goal_ranges:
      x: [400.0, 500.0]
      y: [350.0, 450.0]
    max_steps: 500

  suburban:
    map_name: "K_City_Suburban"
    scenarios:
      - normal_driving
      - curved_road
      - follow_lead_vehicle
      - sudden_brake
      - obstacle_avoid
    spawn_ranges:
      x: [100.0, 300.0]
      y: [100.0, 300.0]
      yaw: [-180.0, 180.0]
    goal_ranges:
      x: [400.0, 600.0]
      y: [100.0, 300.0]
    max_steps: 800

  rural:
    map_name: "K_City_Rural"
    scenarios:
      - normal_driving
      - curved_road
      - follow_lead_vehicle
      - sudden_brake
      - obstacle_avoid
    spawn_ranges:
      x: [0.0, 200.0]
      y: [0.0, 100.0]
      yaw: [-30.0, 30.0]
    goal_ranges:
      x: [500.0, 800.0]
      y: [0.0, 100.0]
    max_steps: 1200

# 시나리오별 랜덤으로 생성될 옵션들의 범위 설정

scenarios:

  # Urban
  traffic_jam:
    npc_count: [5, 12]
    pedestrian_count: [0, 3]
    longtail_triggers: [sudden_brake]

  sudden_brake:
    npc_count: [1, 4]
    pedestrian_count: [0, 1]
    longtail_triggers: [sudden_brake]

  pedestrian_yield:
    npc_count: [1, 4]
    pedestrian_count: [2, 6]
    longtail_triggers: [pedestrian_cross]

  obstacle_avoid:
    npc_count: [1, 3]
    pedestrian_count: [0, 1]
    longtail_triggers: []

  lane_keeping:
    npc_count: [0, 3]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  # Highway
  high_speed_lane_keeping:
    npc_count: [2, 6]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  cut_in_response:
    npc_count: [2, 5]
    pedestrian_count: [0, 0]
    longtail_triggers: [cut_in]

  merge_decision:
    npc_count: [2, 5]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  lane_change_response:
    npc_count: [3, 6]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  tollgate_tunnel_slowdown:
    npc_count: [1, 4]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  # Roundabout
  basic_driving:
    npc_count: [0, 0]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  yield_to_circulating:
    npc_count: [2, 5]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  roundabout_merge:
    npc_count: [2, 4]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  follow_lead_vehicle:
    npc_count: [1, 3]
    pedestrian_count: [0, 1]
    longtail_triggers: [sudden_brake]

  exit_roundabout:
    npc_count: [1, 3]
    pedestrian_count: [0, 0]
    longtail_triggers: []

  # Intersection
  straight_clear:
    npc_count: [0, 2]
    pedestrian_count: [0, 1]
    longtail_triggers: []

  red_light_stop:
    npc_count: [1, 4]
    pedestrian_count: [0, 2]
    longtail_triggers: [red_light]

  stop_and_go:
    npc_count: [1, 4]
    pedestrian_count: [0, 2]
    longtail_triggers: [red_light]

  left_turn:
    npc_count: [1, 3]
    pedestrian_count: [0, 2]
    longtail_triggers: []

  right_turn_pedestrian_yield:
    npc_count: [1, 3]
    pedestrian_count: [2, 5]
    longtail_triggers: [pedestrian_cross]

  no_traffic_light:
    npc_count: [1, 4]
    pedestrian_count: [0, 2]
    longtail_triggers: []

  # Suburban / Rural
  normal_driving:
    npc_count: [0, 3]
    pedestrian_count: [0, 1]
    longtail_triggers: []

  curved_road:
    npc_count: [0, 2]
    pedestrian_count: [0, 0]
    longtail_triggers: []
